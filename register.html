        <script>
            function initValidation() {
                if ($("#form-login").attr("novalidate") != undefined) {
                    // Input, Select, Textarea validations except submit button
                    $("#form-login").find("input,select,textarea").not("[type=submit]").jqBootstrapValidation({
                        submitSuccess: function($form, event) {
                            updateData($form, true);
                            // will not trigger the default submission in favor of the ajax function
                            event.preventDefault();
                            
                            // Lưu thông tin user và chuyển hướng đến trang home
                            const userName = $form.find('input[name="account"]').val();
                            localStorage.setItem('userName', userName);
                            
                            setTimeout(function() {
                                window.location.href = 'home.html';
                            }, 1000);
                        },
                        submitError: function($form, event, errors) {},
                    });
                }
            }

            $(document).ready(function() {
                initValidation();
                $(document).on('click', '.btn-eye', function() {
                    let p = $(this).parent();
                    let id = $(this).attr('data-id');
                    $(this).hide();
                    if ($(p).find('input').attr("type") == "text") {

                        $('.btn-eye-1').show();
                    } else if ($(p).find('input').attr("type") == "password") {
